<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blend Tool for Affinity Gallery</title>
    <style>
      :root {
        --text: #f9fafb;
        --overlay: rgba(0, 0, 0, 0.35);
        --panel: rgba(17, 24, 39, 0.6);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b1020;
        color: var(--text);
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      .hero {
        position: fixed;
        top: 16px;
        left: 16px;
        right: 16px;
        z-index: 20;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 10px 14px;
        border-radius: 12px;
        background: var(--panel);
        backdrop-filter: blur(8px);
      }

      .hero h1 {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0.02em;
      }

      .hero a {
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.92rem;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 999px;
        padding: 7px 12px;
      }

      .gallery {
        scroll-snap-type: y mandatory;
      }

      .slide {
        position: relative;
        min-height: 100vh;
        scroll-snap-align: start;
        overflow: hidden;
      }

      .slide img {
        width: 100%;
        height: 100vh;
        object-fit: cover;
        display: block;
      }

      .slide::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, var(--overlay) 10%, transparent 45%);
        pointer-events: none;
      }

      .caption {
        position: absolute;
        left: 18px;
        bottom: 18px;
        z-index: 5;
        margin: 0;
        font-size: 0.95rem;
        background: rgba(0, 0, 0, 0.45);
        padding: 8px 12px;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <h1>Blend Tool for Affinity</h1>
      <a href="https://github.com/S1m0nP1/Blend-Tool-for-Affinity" target="_blank" rel="noopener noreferrer">View on GitHub</a>
    </header>

    <main class="gallery">
      <section class="slide">
        <img src="./images/showcase-1.png" alt="Blend Tool screenshot 1" loading="eager" />
        <p class="caption">Workflow preview 1</p>
      </section>
      <section class="slide">
        <img src="./images/showcase-2.png" alt="Blend Tool screenshot 2" loading="lazy" />
        <p class="caption">Workflow preview 2</p>
      </section>
    </main>

    <script src="./support-widget.js"></script>
  </body>
</html>
