<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blend Tool for Affinity</title>
    <style>
      :root {
        --bg: #f7fafc;
        --text: #111827;
        --muted: #4b5563;
        --card: #ffffff;
        --accent: #0f766e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(circle at top right, #dff7f3 0%, var(--bg) 45%);
        color: var(--text);
      }
      .wrap {
        max-width: 860px;
        margin: 48px auto;
        padding: 0 20px;
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
      }
      h1 { margin-top: 0; font-size: 2rem; }
      p { line-height: 1.65; color: var(--muted); }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 20px;
      }
      .btn {
        display: inline-block;
        text-decoration: none;
        padding: 10px 14px;
        border-radius: 10px;
        font-weight: 600;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-secondary {
        border: 1px solid #d1d5db;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
       <script src="./support-widget.js"></script>
        <h1>Blend Tool for Affinity</h1>
        <p>
          Open-source utility for Affinity workflows. If this tool helps your process,
          you can support development with a small tip. The project stays free and open source.
        </p>
        <div class="actions">
          <a class="btn btn-primary" href="https://www.buymeacoffee.com/S1m0nP" target="_blank" rel="noopener noreferrer">Support the project</a>
          <a class="btn btn-secondary" href="https://github.com/S1m0nP1/Blend-Tool-for-Affinity" target="_blank" rel="noopener noreferrer">View on GitHub</a>
        </div>
      </section>
    </main>
    <script src="./support-widget.js"></script>
  </body>
</html>
