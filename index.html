<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blend Tool for Affinity Gallery</title>
    <style>
      :root {
        --text: #f9fafb;
        --overlay: rgba(0, 0, 0, 0.35);
        --panel: rgba(17, 24, 39, 0.6);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b1020;
        color: var(--text);
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      .hero {
        position: fixed;
        top: 16px;
        left: 16px;
        right: 16px;
        z-index: 20;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 10px 14px;
        border-radius: 12px;
        background: var(--panel);
        backdrop-filter: blur(8px);
      }

      .hero h1 {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0.02em;
      }

      .hero a {
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.92rem;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 999px;
        padding: 7px 12px;
      }

      .gallery {
        scroll-snap-type: y mandatory;
      }

      .slide {
        position: relative;
        min-height: 100vh;
        scroll-snap-align: start;
        overflow: hidden;
        cursor: zoom-in;
      }

      .slide img {
        width: 100%;
        height: 100vh;
        object-fit: cover;
        object-position: center;
        display: block;
        background: #05070f;
      }

      .slide::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, var(--overlay) 10%, transparent 45%);
        pointer-events: none;
      }

      .caption {
        position: absolute;
        left: 18px;
        bottom: 18px;
        z-index: 5;
        margin: 0;
        font-size: 0.95rem;
        background: rgba(0, 0, 0, 0.45);
        padding: 8px 12px;
        border-radius: 10px;
      }

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        place-items: center;
        background: rgba(0, 0, 0, 0.92);
        padding: 20px;
      }

      .lightbox.open {
        display: grid;
        cursor: zoom-out;
      }

      .lightbox img {
        max-width: min(96vw, 1600px);
        max-height: 90vh;
        width: auto;
        height: auto;
        object-fit: contain;
      }

      .lightbox-close {
        position: fixed;
        top: 16px;
        right: 16px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.9rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <h1>Blend Tool for Affinity</h1>
      <a href="https://github.com/S1m0nP1/Blend-Tool-for-Affinity" target="_blank" rel="noopener noreferrer">View on GitHub</a>
    </header>

    <main class="gallery">
      <section class="slide">
        <img src="./images/showcase-1.png" alt="Blend Tool screenshot 1" loading="eager" />
        <p class="caption">Workflow preview 1</p>
      </section>
      <section class="slide">
        <img src="./images/showcase-2.png" alt="Blend Tool screenshot 2" loading="lazy" />
        <p class="caption">Workflow preview 2</p>
      </section>
    </main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button class="lightbox-close" id="lightboxClose" type="button">Close</button>
      <img id="lightboxImage" alt="Full image preview" />
    </div>

    <script>
      (function () {
        var slides = document.querySelectorAll('.slide img');
        var lightbox = document.getElementById('lightbox');
        var lightboxImage = document.getElementById('lightboxImage');
        var lightboxClose = document.getElementById('lightboxClose');

        function openLightbox(src, alt) {
          lightboxImage.src = src;
          lightboxImage.alt = alt || 'Full image preview';
          lightbox.classList.add('open');
          lightbox.setAttribute('aria-hidden', 'false');
          document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
          lightbox.classList.remove('open');
          lightbox.setAttribute('aria-hidden', 'true');
          document.body.style.overflow = '';
          lightboxImage.removeAttribute('src');
        }

        slides.forEach(function (img) {
          img.addEventListener('click', function () {
            openLightbox(img.src, img.alt);
          });
        });

        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', function (event) {
          if (event.target === lightbox) closeLightbox();
        });

        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape' && lightbox.classList.contains('open')) {
            closeLightbox();
          }
        });
      })();
    </script>

    <script src="./support-widget.js"></script>
  </body>
</html>
